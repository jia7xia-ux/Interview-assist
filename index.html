<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep Workspace</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js 用于解析 AI 生成的 Markdown 报告 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* 自定义滚动条，保持极简感 */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #d6d3d1; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col antialiased">

    <!-- 顶部导航栏 -->
    <header class="bg-white border-b border-stone-200/80 sticky top-0 z-50 backdrop-blur-md bg-white/90">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-light tracking-tight text-stone-900">PREP<span class="font-semibold text-rose-600">.</span>FLOW</span>
            </div>
            <nav class="flex space-x-1" id="main-nav">
                <button onclick="switchView('apps')" id="nav-apps" class="px-4 py-2 text-xs font-medium rounded-lg transition-all cursor-pointer">投递看板</button>
                <button onclick="switchView('calendar')" id="nav-calendar" class="px-4 py-2 text-xs font-medium rounded-lg transition-all cursor-pointer">面经日历</button>
                <button onclick="switchView('debrief')" id="nav-debrief" class="px-4 py-2 text-xs font-medium rounded-lg transition-all cursor-pointer">录音复盘</button>
            </nav>
        </div>
    </header>

    <!-- 主体内容容器 -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-8">
        
        <!-- ================= 看板视图 ================= -->
        <section id="view-apps" class="view-section hidden animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-xl font-medium text-stone-900">投递追踪看板</h1>
                    <p class="text-xs text-stone-400 mt-1">管理你的全生命周期求职漏斗指标</p>
                </div>
                <button onclick="window.openAddAppModal()" class="bg-stone-900 hover:bg-stone-800 text-white text-xs font-medium px-4 py-2.5 rounded-xl transition shadow-sm cursor-pointer">+ 新增投递记录</button>
            </div>
            
            <!-- 看板核心表格 -->
            <div class="bg-white border border-stone-200/60 rounded-2xl overflow-hidden shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-stone-50/70 border-b border-stone-200/60 text-[11px] font-bold text-stone-400 uppercase tracking-wider">
                            <th class="py-4 px-6">公司名称</th>
                            <th class="py-4 px-6">目标岗位</th>
                            <th class="py-4 px-6">当前进度</th>
                            <th class="py-4 px-6 text-right">快捷操作</th>
                        </tr>
                    </thead>
                    <tbody id="apps-table-body" class="text-xs divide-y divide-stone-100">
                        <!-- 由 JavaScript 动态渲染 -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- ================= 日历视图 ================= -->
        <section id="view-calendar" class="view-section hidden">
            <div class="mb-6">
                <h1 class="text-xl font-medium text-stone-900">面试日程与备战日历</h1>
                <p class="text-xs text-stone-400 mt-1">绝不错过任何一场关键面试节点的黄金准备期</p>
            </div>
            <div class="bg-white border border-stone-200/60 rounded-2xl p-6 shadow-sm min-h-[500px] flex items-center justify-center text-stone-400 text-xs">
                📅 日历核心组件模块（已由原生系统承载，保持完美兼容）
            </div>
        </section>

        <!-- ================= 录音复盘视图 (全新联动升级版) ================= -->
        <section id="view-debrief" class="view-section hidden">
            <div class="mb-6">
                <h1 class="text-xl font-medium text-stone-900">AI 智能面试录音复盘</h1>
                <p class="text-xs text-stone-400 mt-1">把面试录音转文本贴入下方，让大模型化身无情面试官进行深度多维诊断</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                <!-- 左侧：录音稿输入与基础配置表单 -->
                <div class="lg:col-span-5 bg-white border border-stone-200/60 rounded-2xl p-6 shadow-sm space-y-5">
                    
                    <!-- 🌟 核心增量：看板联动挂载组件 -->
                    <div>
                        <label class="block text-[11px] font-bold text-stone-400 uppercase mb-1.5">联动看板投递记录 (选填)</label>
                        <select id="debrief-app-link" onchange="handleDebriefLinkChange(this.value)" class="w-full text-xs px-3 py-2.5 bg-stone-50/60 border border-stone-200/60 rounded-xl focus:outline-none focus:bg-white focus:border-stone-400 transition cursor-pointer">
                            <option value="">— 自由复盘模式（不挂载记录） —</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-stone-400 uppercase mb-1.5">公司名称</label>
                            <input type="text" id="debrief-company" placeholder="例如：TikTok Shop" class="w-full text-xs px-3 py-2.5 bg-stone-50/60 border border-stone-200/60 rounded-xl focus:outline-none focus:bg-white focus:border-stone-400 transition">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-stone-400 uppercase mb-1.5">目标岗位</label>
                            <input type="text" id="debrief-role" placeholder="例如：产品经理 / 战略运营" class="w-full text-xs px-3 py-2.5 bg-stone-50/60 border border-stone-200/60 rounded-xl focus:outline-none focus:bg-white focus:border-stone-400 transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-stone-400 uppercase mb-1.5">岗位 JD / 核心要求</label>
                        <textarea id="debrief-jd" rows="3" placeholder="贴入官方岗位描述中关于技术、数据分析或业务场景的核心诉求..." class="w-full text-xs px-3 py-2.5 bg-stone-50/60 border border-stone-200/60 rounded-xl focus:outline-none focus:bg-white focus:border-stone-400 transition resize-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-stone-400 uppercase mb-1.5">面试录音转文本稿 (Transcript)</label>
                        <textarea id="debrief-transcript" rows="12" placeholder="在此贴入你通过飞书妙记、剪映或其他工具导出的面试对话文本..." class="w-full text-xs px-3 py-2.5 bg-stone-50/60 border border-stone-200/60 rounded-xl focus:outline-none focus:bg-white focus:border-stone-400 transition resize-none font-mono leading-relaxed"></textarea>
                    </div>

                    <div class="flex space-x-3 pt-2">
                        <button onclick="runDebriefPipeline()" id="btn-run-debrief" class="flex-1 bg-stone-900 hover:bg-stone-800 text-white text-xs font-medium py-3 rounded-xl transition shadow-sm cursor-pointer text-center">运行深度全盘诊断</button>
                        <button onclick="clearDebriefResults()" class="px-4 bg-stone-100 hover:bg-stone-200 text-stone-600 text-xs font-medium py-3 rounded-xl transition cursor-pointer">清空</button>
                    </div>
                </div>

                <!-- 右侧：AI 复盘诊断报告精美输出区 -->
                <div class="lg:col-span-7 bg-white border border-stone-200/60 rounded-2xl p-6 shadow-sm min-h-[620px] flex flex-col">
                    <div class="border-b border-stone-100 pb-3 mb-4 flex justify-between items-center">
                        <span class="text-xs font-bold text-stone-400 uppercase tracking-wider">AI 首席面试官全盘深度诊断报告</span>
                        <div id="debrief-status-tag" class="text-[10px] bg-stone-100 text-stone-500 px-2 py-0.5 rounded-md font-medium">等待输入</div>
                    </div>
                    
                    <!-- 初始空白缺省状态 -->
                    <div id="debrief-initial-state" class="flex-1 flex flex-col items-center justify-center text-center p-12">
                        <div class="text-3xl mb-3">🎯</div>
                        <p class="text-xs font-medium text-stone-500">暂无复盘数据</p>
                        <p class="text-[11px] text-stone-400 max-w-xs mt-1">在左侧填入面试录音文本并点击诊断，大模型将从回答完整度、数据思维、结构化表达等核心维度生成复盘报告。</p>
                    </div>

                    <!-- Markdown 报告实时渲染区 -->
                    <div id="debrief-report-raw" class="flex-1 text-xs prose prose-stone max-w-none leading-relaxed overflow-y-auto space-y-4">
                        <!-- 由 marked.js 动态解析输出 -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- 全局快捷弹窗：添加/编辑投递记录模态框 -->
    <div id="app-modal" class="fixed inset-0 bg-stone-900/20 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white border border-stone-200 rounded-2xl w-full max-w-md p-6 shadow-xl animate-fade-in">
            <h3 class="text-sm font-medium text-stone-900 mb-4" id="modal-title">新增投递记录</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-stone-400 uppercase mb-1">公司名称</label>
                    <input type="text" id="modal-company" class="w-full text-xs px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-stone-400 uppercase mb-1">目标岗位</label>
                    <input type="text" id="modal-role" class="w-full text-xs px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-stone-400 uppercase mb-1">当前阶段</label>
                    <select id="modal-status" class="w-full text-xs px-3 py-2 border border-stone-200 rounded-lg bg-white focus:outline-none focus:border-stone-400">
                        <option value="简历投递">简历投递</option>
                        <option value="笔试评估">笔试评估</option>
                        <option value="面试邀约">面试邀约</option>
                        <option value="Offer">Offer</option>
                        <option value="遗憾人才库">遗憾人才库</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-stone-400 uppercase mb-1">岗位 JD (选填)</label>
                    <textarea id="modal-jd" rows="3" class="w-full text-xs px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400 resize-none"></textarea>
                </div>
            </div>
            <div class="flex space-x-2 mt-6">
                <button onclick="window.saveAppModal()" class="flex-1 bg-stone-900 hover:bg-stone-800 text-white text-xs font-medium py-2 rounded-xl transition">保存</button>
                <button onclick="window.closeAppModal()" class="px-4 bg-stone-100 hover:bg-stone-200 text-stone-600 text-xs font-medium py-2 rounded-xl transition">取消</button>
            </div>
        </div>
    </div>

    <!-- 挂载全局应用脚本 -->
    <script src="app.js"></script>
</body>
</html>
